{% extends 'base.html' %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h2 class="fw-bold m-0 d-flex align-items-center gap-2">
            <i class="bi bi-activity text-primary"></i> 운동 프로그램 추가
        </h2>
        <p class="m-0 mt-2 fs-6">새로운 운동 프로그램을 등록합니다.</p>
    </div>
    <a href="/workout_programs" class="btn btn-premium-outline"><i class="bi bi-arrow-left"></i> 목록으로</a>
</div>

<div class="premium-card">
    <form method="POST" action="/workout_programs/add">
        <div class="mb-4">
            <label for="name" class="form-label fw-bold">프로그램명 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name" required placeholder="예: 기초 체력 훈련">
        </div>
        
        <div class="mb-4">
            <label for="description" class="form-label fw-bold">설명</label>
            <textarea class="form-control" id="description" name="description" rows="3" placeholder="프로그램에 대한 상세 설명"></textarea>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <label for="min_attendance" class="form-label fw-bold">최소 출석 횟수 <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="min_attendance" name="min_attendance" required min="0" placeholder="0">
                <small class="text-muted">이 횟수 이상 출석한 회원에게 적용됩니다.</small>
            </div>
            
            <div class="col-md-6 mb-4">
                <label for="max_attendance" class="form-label fw-bold">최대 출석 횟수</label>
                <input type="number" class="form-control" id="max_attendance" name="max_attendance" min="0" placeholder="비워두면 제한 없음">
                <small class="text-muted">비워두면 상한 제한이 없습니다.</small>
            </div>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary text-white"><i class="bi bi-check-lg"></i> 저장</button>
            <a href="/workout_programs" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
{% endblock %}
