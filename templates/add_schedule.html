{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h3 class="fw-bold text-dark mb-4">
                    <i class="bi bi-calendar-plus-fill text-primary me-2"></i>새로운 스케줄 등록
                </h3>

                <form action="{{ url_for('add_schedule_page') }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">스케줄 제목</label>
                        <input type="text" class="form-control rounded-3" id="title" name="title" placeholder="예: 홍길동 회원님 PT" required>
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label fw-bold">카테고리 분류</label>
                        <select class="form-select rounded-3" id="category" name="category" required>
                            <option value="pt" selected>🥊 PT 수업</option>
                            <option value="external">🚗 외부 활동</option>
                            <option value="contest">🏆 대회 활동</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="schedule_date" class="form-label fw-bold">날짜</label>
                            <input type="date" class="form-control rounded-3" id="schedule_date" name="schedule_date" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="start_time" class="form-label fw-bold">시작 시간</label>
                            <input type="time" class="form-control rounded-3" id="start_time" name="start_time" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="end_time" class="form-label fw-bold">종료 시간</label>
                            <input type="time" class="form-control rounded-3" id="end_time" name="end_time" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label fw-bold">상세 내용 (메모)</label>
                        <textarea class="form-control rounded-3" id="description" name="description" rows="4" placeholder="세부 사항을 입력하세요."></textarea>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('schedule') }}" class="btn btn-light rounded-pill px-4">취소</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">스케줄 저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 오늘 날짜를 기본값으로 넣어주는 센스 코드
    document.getElementById('schedule_date').value = new Date().toISOString().substring(0, 10);
</script>
{% endblock %}
